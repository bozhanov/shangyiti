<svg xmlns="http://www.w3.org/2000/svg" width="500" height="700" fill="none">
  <!-- Subtle paper grain / wrinkle noise -->
  <filter id="n" x="0" y="0" width="100%" height="100%">
    <feTurbulence type="fractalNoise" baseFrequency="0.7" numOctaves="4" seed="3" stitchTiles="stitch"/>
    <feColorMatrix type="saturate" values="0"/>
  </filter>
  <rect width="500" height="700" filter="url(#n)" opacity="0.3"/>

  <!-- Very faint fold lines (soft bezier curves) -->
  <g stroke="#a09080" stroke-width="0.5" fill="none" opacity="0.06">
    <path d="M0 120 Q250 100 500 130"/>
    <path d="M0 350 Q250 330 500 360"/>
    <path d="M0 520 Q250 510 500 530"/>
    <path d="M80 0 Q90 350 70 700"/>
    <path d="M300 0 Q310 350 290 700"/>
    <path d="M450 0 Q455 350 448 700"/>
  </g>

  <!-- Faint math expressions (answers 1-9), scattered, very low contrast -->
  <g font-family="Georgia, 'Times New Roman', serif" font-style="italic" fill="#908070" opacity="0.04">
    <text x="30"  y="55">8 + 1</text>
    <text x="360" y="95">9 − 2</text>
    <text x="160" y="155">3 × 2</text>
    <text x="50"  y="215">6 ÷ 2</text>
    <text x="390" y="265">4 + 5</text>
    <text x="210" y="325">7 − 3</text>
    <text x="90"  y="385">2 × 3</text>
    <text x="340" y="445">8 ÷ 4</text>
    <text x="170" y="505">1 + 9</text>
    <text x="430" y="565">5 × 1</text>
    <text x="60"  y="625">9 − 7</text>
    <text x="290" y="685">6 ÷ 3</text>
    <text x="200" y="95">7 + 2</text>
    <text x="420" y="155">4 × 2</text>
    <text x="100" y="265">8 ÷ 2</text>
    <text x="350" y="325">3 + 6</text>
    <text x="230" y="385">5 − 1</text>
    <text x="70"  y="445">2 × 4</text>
    <text x="400" y="505">9 ÷ 3</text>
    <text x="180" y="565">1 + 5</text>
    <text x="310" y="625">8 − 5</text>
    <text x="130" y="685">6 × 1</text>
    <text x="440" y="55">3 ÷ 1</text>
    <text x="20"  y="325">4 + 4</text>
    <text x="460" y="385">7 ÷ 7</text>
    <text x="140" y="445">9 − 8</text>
    <text x="370" y="505">2 × 2</text>
    <text x="230" y="565">5 + 3</text>
    <text x="80"  y="625">6 − 4</text>
    <text x="320" y="685">8 ÷ 8</text>
  </g>
</svg>
